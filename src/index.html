<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
    <link rel="stylesheet" href="output.css">
    
    <title>Fleura | Home</title>
</head>
<body>
    
    <header class="fixed top-0 left-0 w-full z-50">
        <div class="w-full h-[65px] shadow flex justify-between items-center px-2 md:px-12 md:py-3 bg-mauve-100">
            <div><img src="images/logo.png" class=" w-28 md:w-40 h-[100px] md:w-[160px] md:h-[120px] object-cover mb-2"></div>
            <div class="flex justify-center  items-center h-full gap-4 font-serif" id="register_info">
                <button class="hover:text-shadow-sm hover:text-shadow-[#BD868C]/20"><a href="login.html">Login</a></button>
                <div class="w-[2px] h-[20px] bg-[#BD868C]"></div>
                <button class="hover:text-shadow-sm hover:text-shadow-[#BD868C]/20"><a href="register.html">Register</a></button>
            </div>
            <div class="flex gap-6 hidden font-serif " id="user_info">
                <div class="mt-[6px] flex gap-3 items-center md:gap-6 ">
                    <h2 id="name_acc" class="hidden md:block"></h2>
                    <div class="relative">
                        <div id="cart_section" class="">
                            <i class="fas fa-shopping-basket text-[#AC7A7F] text-xl cursor-pointer" id="cart" onClick="DrawCartItems()"></i>
                            <span class=" w-[8px] h-[8px] rounded-full  inline-flex items-center justify-center " id="budge"></span>
                        </div> 
                        <!-- cart -->
                        <div id="mini_Cart" class=" flex flex-col absolute w-[400px] bg-[#2b2b2b] px-4 py-3 rounded-2xl shadow-2xl border border-[#E8D6D8]  z-50  top-12 right-0 opacity-0 invisible scale-95  transition-all duration-300">
                            <!-- header -->
                            <div class="flex items-center justify-end gap-2 border-b-1 border-[#E6D6D8]/70 pb-3">
                                <h2 class="text-[#6E3B43] font-semibold font-sans text-2xl ">My Cart</h2>
                                <img src="images/cartLogo.png" class="w-9 h-9 mt-1 object-cover">
                            </div>
                            <!-- products -->
                             <div id="cart_items" class="flex  flex-col h-[220px] overflow-y-auto "></div>
                               
                            <!-- footer -->
                             <div class="flex flex-col gap-2 font-sans font-semibold">
                                <div class="total_price border-b-1 border-[#E6D6D8]/60 pb-3 flex justify-between text-mauve-100 pt-2">
                                    <h2 id="totalPrice"></h2>
                                    <h2>ToTAL</h2>
                                </div>
                                <button class="w-full py-3 px-1 bg-[#BD868C] rounded-xl text-white cursor-pointer" id="ViewCart">View Cart</button>
                                <button class="w-full py-3 px-1 bg-mauve-100 rounded-xl text-[#6E3B43] cursor-pointer " onClick="closeCart()">Continue Shopping</button>
                             </div>
                        </div>
                    </div>    
                </div>
                <button class="border-1 border-[#BD868C] px-2 py-1 shadow cursor-pointer hover:shadow-[#CDA4A9] " id="Logout">Logout</button>
            </div>
        </div>
    </header>

    <div id="overlay"
class="fixed top-[65px] left-0 w-full hidden h-[calc(100vh-65px)]
      bg-black/20 backdrop-blur-sm  z-40">
 </div>

    <main class="h-full w-full w-full pt-[80px]">
        
        <div class=" h-full w-full">
            <div class=" flex flex-col md:flex-row  items-center justify-center gap-6 py-6 px-4" id="search_section">
                <div class="relative w-52  ">
                    <select class="appearance-none w-full border border-[#E6D6D8] text-gray-600  shadow-sm rounded-xl px-3 py-2 pr-10 focus:border-[#BD868C] focus:ring-4 focus:ring-[#CDA4A9]/30 focus:outline-none">
                        <option value="All" >All Categories</option>
                        <option value="Bouquets" >Bouquets</option>
                        <option value="Roses">Roses</option>
                        <option value="Tulips">Tulips</option>
                        <option value="Lilies">Lilies</option>
                        <option value="Sunflowers">Sunflowers</option>
                        <option value="Orchids">Orchids</option>
                        
                    </select>
                    <span class="absolute top-3 right-3 text-gray-600 text-sm"> <i class="fa-solid fa-chevron-down"></i></span>
                </div>
                <div class="relative w-full md:w-[500px] lg:w-[600px]">
                    <input type="text" placeholder="Search flowers..." class="bg-white border w-full border-[#E6D6D8] focus:border-[#BD868C] focus:ring-4 focus:ring-[#CDA4A9]/30 focus:outline-none  shadow-sm rounded-xl px-3 py-2 " />
                    <img src="images/search_logo.png" class="inline-block absolute w-[30px] h-[30px] object-cover top-1/2 opacity-70 -translate-y-1/2 right-2">
                </div>
                <button
                    id="search_btn"
                    class="bg-[#AC7A7F]
                    hover:bg-[#9C6F73]
                    text-white
                    font-medium
                    px-8
                    py-2
                    rounded-xl
                    shadow-md
                    hover:shadow-2xl
                    transition-all
                    duration-300">
                        Search
                    </button>
           </div>
        </div>
    </main>
    <section id="flowers_container" class="grid grid-cols-1  lg:grid-cols-3 xl:grid-cols-4 md:gap-8  lg:gap-8 gap-6 px-4 md:px-8 lg:px-10 py-10  ">
        
    </section>



    <script></script>
    <script src="js/index.js"></script>
    <script src="js/global.js"></script>
</body>
</html>
