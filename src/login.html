<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./output.css">
    <title>Fleura | Login</title>
</head>
<body>
    <header>

    </header>
    <main class="w-full">
    <div class="  min-h-screen w-full bg-[url('images/Login_register_photo.jpg')]  bg-cover bg-center flex justify-center items-center ">
        <form class="  h-[400px] w-[400px] md:h-[380px] md:w-[800px] bg-mauve-100 rounded-xl pt-[20px] px-[60px] flex flex-col shadow-2xl">
           <div class=" flex justify-center items-center ">
            <img src="images/logo_register_login.png" class="bg-cover w-[60px] h-[70px]">
            <h2 class="font-bold ml-2 mt-4 text-xl font-serif">Welcome in Fleura </h2>
            </div>
                <div class="flex flex-col">
                

                <div class="mt-4">
                        <label for="email" class="block mb-2 text-[15px] " >Email</label>
                        <input type="email" id="email" class="w-full border-[#94656D] border-1 h-[30px] rounded-lg p-2 focus:shadow-[#94656D] outline-none transition duration-300 focus:ring-[#815058] focus:ring-1 " />
                </div>

                 <div class="mt-4">
                        <label for="password" class="block mb-2 text-[15px] " >Password</label>
                        <input type="password" id="password" class="w-full border h-[30px] rounded-lg p-2 border-[#94656D] border-1 focus:shadow-[#94656D] outline-none transition duration-300 focus:ring-[#815058] focus:ring-1" />
                </div>
            </div>
            
            <input type="submit" value="Login" class="cursor-pointer w-[75px] h-[40px] bg-[#815058] rounded-lg mt-6 text-mauve-100">

            <h2 class=" mt-2">Don't have an account? <a href="register.html" class="text-[#6E3B43]">Register</a></h2>
           
        </form>
    </div>
    </main>
    <script src="js/login.js"></script>
</body>
</html>
